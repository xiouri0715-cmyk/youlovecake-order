<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유럽케이크 주문관리 - 구글시트 연동형</title>
<style>
body { font-family:sans-serif; background:#f7f3ef; margin:0; padding:12px; }
.header { position:sticky; top:0; background:#f7f3ef; z-index:10; padding-bottom:10px; }
h1 { margin:0; font-size:19px; }
.now, .stats, .guide { font-size:13px; color:#666; margin-top:4px; }
textarea { width:100%; height:220px; box-sizing:border-box; border:none; border-radius:14px; padding:14px; font-size:14px; resize:vertical; }
textarea::placeholder { color:#b8aaa0; }
.search { width:100%; box-sizing:border-box; margin-top:8px; padding:11px; border:none; border-radius:12px; font-size:14px; }
.main-btn { width:100%; margin-top:8px; padding:12px; border:none; border-radius:12px; background:#c89b7b; color:white; font-weight:bold; font-size:15px; }
.sub-btn { width:100%; margin-top:6px; padding:10px; border:none; border-radius:12px; background:#ead8cc; color:#6f4a35; font-weight:bold; }
.date-group { margin-top:20px; }
.date-title { font-size:18px; font-weight:bold; color:#6f4a35; margin-bottom:8px; }
.card { background:white; border-radius:13px; padding:12px; margin-bottom:8px; box-shadow:0 3px 8px rgba(0,0,0,0.05); }
.summary { display:flex; justify-content:space-between; align-items:center; cursor:pointer; gap:8px; }
.time { font-weight:bold; color:#d85f86; min-width:76px; }
.name { font-weight:bold; font-size:16px; text-align:right; }
.detail { display:none; margin-top:9px; padding-top:8px; border-top:1px dashed #ddd; font-size:13px; line-height:1.8; }
.warn { color:#d33; font-weight:bold; }
.time-edit { width:100%; margin-top:7px; padding:9px; border:1px solid #ddd; border-radius:9px; background:white; font-size:14px; }
.small-btn { width:100%; margin-top:6px; padding:8px; border:none; border-radius:9px; background:#eee; }
.done { opacity:0.45; }
.hold { background:#fff3cd; }
.cancel { background:#eee; text-decoration:line-through; }
.empty { text-align:center; color:#999; margin-top:35px; }
.error { color:#d33; font-weight:bold; }
</style>
</head>
<body>

<div class="header">
  <h1>🍰 유럽케이크 주문관리</h1>
  <div class="now" id="nowText"></div>
  <div class="guide">구글시트 연동형 / 여러 폰에서 같은 주문을 봅니다.</div>
  <div class="stats" id="stats">불러오는 중...</div>

  <textarea id="input" placeholder="주문서를 꾹 눌러 붙여넣어주세요.&#10;&#10;예)&#10;❤️ 성함 : 홍길동&#10;❤️ 연락처 : 01012345678&#10;❤️ 픽업 날짜/시간 : 5월8일 오후12시&#10;❤️ 케이크 종류 : 기본&#10;❤️ 케이크 사이즈 : 미니&#10;❤️ 시트 선택 : 딸기&#10;❤️ 레터링 문구 : 감사합니다&#10;❤️ 가격 : 38000"></textarea>

  <button class="main-btn" onclick="addOrders()">주문 반영</button>
  <button class="sub-btn" onclick="loadOrders()">새로고침</button>

  <input class="search" id="search" placeholder="이름 / 전화번호 검색">
</div>

<div id="list"></div>

<script>
/**
 * 여기에 Apps Script 웹앱 URL을 넣으세요.
 * 예: const API_URL = "https://script.google.com/macros/s/AKfycbzSXKYXi3iAc8bpptrg5XgXF2gq2cTL6qcg9ZiAKCjOAZV2SeRw4IVMiTvuziIDg-rV/exec";
 */
const API_URL = "여기에_Apps_Script_웹앱_URL_붙여넣기";

let orders = [];

function updateNow() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  const h = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");
  nowText.innerText = `현재 ${y}-${m}-${day} ${h}:${min}`;
}

function getValue(block, label) {
  const regex = new RegExp(label + "\\s*:\\s*([^\\n]*)");
  const match = block.match(regex);
  return match ? match[1].trim() : "";
}

function korTime(text) {
  return text
    .replace(/한시/g, "1시").replace(/두시/g, "2시").replace(/세시/g, "3시")
    .replace(/네시/g, "4시").replace(/다섯시/g, "5시").replace(/여섯시/g, "6시")
    .replace(/일곱시/g, "7시").replace(/여덟시/g, "8시").replace(/아홉시/g, "9시")
    .replace(/열시/g, "10시").replace(/열한시/g, "11시").replace(/열두시/g, "12시");
}

function parsePickup(text) {
  text = korTime(text || "");

  const year = new Date().getFullYear();
  const monthMatch = text.match(/(\d+)\s*월/);
  const dayMatch = text.match(/(\d+)\s*일/);

  if (!monthMatch || !dayMatch) return null;

  const month = Number(monthMatch[1]);
  const day = Number(dayMatch[1]);

  if (/언제든|아무때나|시간미정/.test(text)) {
    return {
      pickupDate: `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`,
      pickupTime: "시간미정",
      hour24: 13,
      unknown: true
    };
  }

  let hour = null;
  const ampmMatch = text.match(/(오전|오후)\s*(\d{1,2})\s*시/);
  const hourMatch = text.match(/(\d{1,2})\s*시/);

  if (ampmMatch) {
    hour = Number(ampmMatch[2]);
    if (ampmMatch[1] === "오후" && hour !== 12) hour += 12;
    if (ampmMatch[1] === "오전" && hour === 12) hour = 0;
  } else if (hourMatch) {
    hour = Number(hourMatch[1]);
  } else {
    return null;
  }

  return {
    pickupDate: `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`,
    pickupTime: hourToText(hour),
    hour24: hour,
    unknown: false
  };
}

function hourToText(hour) {
  const ampm = hour >= 12 ? "오후" : "오전";
  let display = hour > 12 ? hour - 12 : hour;
  if (display === 0) display = 12;
  return `${ampm} ${display}시`;
}

async function apiPost(payload) {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload),
    headers: { "Content-Type": "text/plain;charset=utf-8" }
  });

  return await res.json();
}

async function loadOrders() {
  if (!API_URL || API_URL.includes("여기에_")) {
    stats.innerHTML = `<span class="error">Apps Script 웹앱 URL을 먼저 넣어주세요.</span>`;
    return;
  }

  try {
    stats.innerText = "구글시트에서 불러오는 중...";
    const res = await fetch(`${API_URL}?action=list`);
    const data = await res.json();

    if (!data.ok) throw new Error(data.message || "불러오기 실패");

    orders = data.orders || [];
    render();
  } catch (err) {
    stats.innerHTML = `<span class="error">불러오기 오류: ${err.message}</span>`;
  }
}

async function addOrders() {
  const raw = input.value.trim();
  if (!raw) return alert("주문서를 붙여넣어 주세요.");

  const blocks = raw
    .split(/(?=❤️\s*성함\s*:)/g)
    .map(b => b.trim())
    .filter(b => b.includes("성함"));

  const parsed = [];
  let fail = 0;

  blocks.forEach(block => {
    const pickup = parsePickup(getValue(block, "픽업 날짜/시간"));

    if (!pickup) {
      fail++;
      return;
    }

    parsed.push({
      id: String(Date.now()) + "-" + Math.random().toString(36).slice(2),
      name: getValue(block, "성함"),
      phone: getValue(block, "연락처"),
      package: getValue(block, "패키지 선택") || getValue(block, "케이크 종류") || getValue(block, "케이크 사이즈"),
      size: getValue(block, "케이크 사이즈"),
      sheet: getValue(block, "시트 선택"),
      design: getValue(block, "색감 또는 분위기, 디자인"),
      lettering: getValue(block, "레터링 문구"),
      review: getValue(block, "리뷰 이벤트"),
      price: Number((getValue(block, "가격") || "0").replace(/[^0-9]/g, "")),
      status: "normal",
      raw: block,
      ...pickup
    });
  });

  if (parsed.length === 0) return alert(`등록 가능한 주문이 없습니다. 실패 ${fail}건`);

  try {
    stats.innerText = "구글시트에 저장 중...";
    const data = await apiPost({ action: "add", orders: parsed });

    if (!data.ok) throw new Error(data.message || "저장 실패");

    input.value = "";
    await loadOrders();
    alert(`등록 ${data.added}건 / 실패 ${fail}건`);
  } catch (err) {
    alert("저장 오류: " + err.message);
    render();
  }
}

async function updateHour(id, hourValue) {
  const order = orders.find(o => o.id == id);
  if (!order) return;

  const pickupTime = hourToText(Number(hourValue));

  try {
    await apiPost({
      action: "updateTime",
      id,
      pickupDate: order.pickupDate,
      pickupTime
    });
    await loadOrders();
  } catch (err) {
    alert("시간 수정 오류: " + err.message);
  }
}

async function setStatus(id, status) {
  try {
    await apiPost({ action: "updateStatus", id, status });
    await loadOrders();
  } catch (err) {
    alert("상태 변경 오류: " + err.message);
  }
}

function toggleDetail(el) {
  const detail = el.nextElementSibling;
  detail.style.display = detail.style.display === "block" ? "none" : "block";
}

function render() {
  const q = search.value.trim();

  const filtered = orders
    .filter(o => !q || (o.name || "").includes(q) || (o.phone || "").includes(q))
    .sort((a, b) => {
      const ad = `${a.pickupDate} ${a.pickupTime}`;
      const bd = `${b.pickupDate} ${b.pickupTime}`;
      return ad.localeCompare(bd);
    });

  list.innerHTML = "";

  let total = 0;
  filtered.forEach(o => {
    if (o.status !== "cancel") total += Number(o.price || 0);
  });

  stats.innerText = `총 ${filtered.length}건 / 예상매출 ${total.toLocaleString()}원`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty">등록된 주문이 없습니다.</div>`;
    return;
  }

  const grouped = {};
  filtered.forEach(order => {
    const key = order.pickupDate || "날짜없음";
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(order);
  });

  Object.keys(grouped).sort().forEach(dateKey => {
    const group = document.createElement("div");
    group.className = "date-group";

    const dateText = dateKey.replace(/^(\d{4})-(\d{2})-(\d{2})$/, (_, y, m, d) => `${Number(m)}월 ${Number(d)}일`);
    group.innerHTML = `<div class="date-title">📅 ${dateText}</div>`;

    grouped[dateKey].forEach(order => {
      const hour24 = timeTextToHour(order.pickupTime);
      const card = document.createElement("div");
      card.className = `card ${order.status || "normal"}`;

      card.innerHTML = `
        <div class="summary" onclick="toggleDetail(this)">
          <div class="time">${order.pickupTime || "-"}</div>
          <div class="name">${order.name || "이름없음"}</div>
        </div>

        <div class="detail">
          ${order.pickupTime === "시간미정" ? `<div class="warn">⚠ 픽업시간 확인 필요</div>` : ""}

          <b>픽업시간 수정</b>
          <select class="time-edit" onchange="updateHour('${order.id}', this.value)">
            ${makeHourOptions(hour24)}
          </select>

          <br>
          <b>연락처</b> : ${order.phone || "-"}<br>
          <b>케이크</b> : ${order.package || "-"} ${order.size ? "/ " + order.size : ""}<br>
          <b>시트</b> : ${order.sheet || "-"}<br>
          <b>디자인</b> : ${order.design || "-"}<br>
          <b>레터링</b> : ${order.lettering || "-"}<br>
          <b>리뷰</b> : ${order.review || "-"}<br>
          <b>가격</b> : ${order.price ? Number(order.price).toLocaleString() + "원" : "-"}<br>

          <button class="small-btn" onclick="event.stopPropagation(); setStatus('${order.id}', 'done')">픽업완료</button>
          <button class="small-btn" onclick="event.stopPropagation(); setStatus('${order.id}', 'hold')">보류</button>
          <button class="small-btn" onclick="event.stopPropagation(); setStatus('${order.id}', 'cancel')">취소</button>
          <button class="small-btn" onclick="event.stopPropagation(); setStatus('${order.id}', 'normal')">정상</button>
        </div>
      `;

      group.appendChild(card);
    });

    list.appendChild(group);
  });
}

function timeTextToHour(text) {
  const m = String(text || "").match(/(오전|오후)\s*(\d{1,2})시/);
  if (!m) return 13;

  let h = Number(m[2]);
  if (m[1] === "오후" && h !== 12) h += 12;
  if (m[1] === "오전" && h === 12) h = 0;
  return h;
}

function makeHourOptions(selectedHour) {
  let html = "";
  for (let h = 9; h <= 20; h++) {
    html += `<option value="${h}" ${h === selectedHour ? "selected" : ""}>${hourToText(h)}</option>`;
  }
  return html;
}

search.oninput = render;

updateNow();
loadOrders();

setInterval(() => {
  updateNow();
  loadOrders();
}, 60000);
</script>

</body>
</html>
